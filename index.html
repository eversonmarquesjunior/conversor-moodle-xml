<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor Moodle XML</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<style>
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a26; --border:#2a2a3e;
    --accent:#5b5ef4; --accent2:#a78bfa; --green:#22d3a3; --red:#f87171;
    --text:#e8e8f0; --muted:#6b6b8a;
    --mono:'DM Mono',monospace; --sans:'Syne',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;width:500px;height:500px;background:rgba(91,94,244,.1);top:-100px;left:-100px}
  .wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:60px 24px}
  header{padding:0 0 40px;text-align:center}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(91,94,244,.15);border:1px solid rgba(91,94,244,.3);border-radius:999px;padding:4px 14px;font-size:11px;font-family:var(--mono);color:var(--accent2);letter-spacing:.08em;margin-bottom:12px}
  h1{font-size:2.6rem;font-weight:700;background:linear-gradient(135deg,#fff 0%,var(--accent2) 60%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;transition:all .3s ease}
  
  /* Estilos da Drop Zone */
  .drop-zone{border:2px dashed var(--border);border-radius:14px;padding:50px 24px;text-align:center;cursor:pointer;transition:all .25s ease;background:rgba(255,255,255,0.01)}
  .drop-zone.drag-over{border-color:var(--accent);background:rgba(91,94,244,0.1);transform:scale(1.02)}
  .drop-icon{font-size:48px;display:block;margin-bottom:12px}
  
  #fi{display:none}
  .file-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
  .file-item{background:rgba(34,211,163,.08);border:1px solid rgba(34,211,163,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--green);font-family:var(--mono);display:flex;justify-content:space-between}
  
  .btn-cvt{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent) 0%,#7c3aed 100%);border:none;border-radius:14px;color:#fff;font-family:var(--sans);font-size:16px;font-weight:800;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:10px}
  .btn-cvt:disabled{opacity:.4;cursor:not-allowed}
  
  .btn-clear{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;margin-top:15px;text-decoration:underline;display:none;width:100%;text-align:center;transition:color 0.2s}
  .btn-clear:hover{color:var(--red)}

  #toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:10px}
  .toast{padding:14px 20px;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:600;color:#fff;animation:slideIn 0.3s ease forwards}
  .toast.success{background:var(--green);color:#0a2a1f}
  .toast.error{background:var(--red)}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="blob"></div>
<div class="wrap">
  <header>
    <div class="badge">v1 - 03/2026</div>
    <h1>DOCX → MOODLE XML</h1>
  </header>

  <div class="card">
    <div class="drop-zone" id="dz" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept=".docx" multiple>
      <span class="drop-icon">📂</span>
      <strong>Arraste ou selecione seus arquivos .docx</strong>
    </div>
    <div class="file-list" id="fl"></div>
    <button class="btn-clear" id="btn-clear" onclick="clearFiles()">Limpar arquivos</button>
  </div>

  <button class="btn-cvt" id="bcvt" disabled onclick="doConvert()">
    <span id="btn-text">CONVERTER E BAIXAR</span>
  </button>
</div>

<div id="toast-container"></div>

<script>
let filesData = [];
const W='http://schemas.openxmlformats.org/wordprocessingml/2006/main', A='http://schemas.openxmlformats.org/drawingml/2006/main', R='http://schemas.openxmlformats.org/officeDocument/2006/relationships', REL_NS='http://schemas.openxmlformats.org/package/2006/relationships';

// Configuração do Drag and Drop
const dropZone = document.getElementById('dz');

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
  dropZone.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
  e.preventDefault();
  e.stopPropagation();
}

['dragenter', 'dragover'].forEach(eventName => {
  dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
});

['dragleave', 'drop'].forEach(eventName => {
  dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
});

dropZone.addEventListener('drop', (e) => {
  const dt = e.dataTransfer;
  const files = dt.files;
  handleFiles(files);
}, false);

// Input via clique
document.getElementById('fi').onchange = e => handleFiles(e.target.files);

function handleFiles(files) {
  const filtered = [...files].filter(f => f.name.endsWith('.docx'));
  if(filtered.length === 0) {
    showToast("Por favor, selecione arquivos .docx", "error");
    return;
  }

  let loadedCount = 0;
  filtered.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      filesData.push({ name: f.name, buffer: ev.target.result });
      document.getElementById('fl').innerHTML += `<div class="file-item"><span>📄 ${f.name}</span></div>`;
      document.getElementById('bcvt').disabled = false;
      document.getElementById('btn-clear').style.display = 'block';
      
      loadedCount++;
      if(loadedCount === filtered.length) {
        showToast(`${filtered.length} arquivo(s) adicionado(s)`, "success");
      }
    };
    reader.readAsArrayBuffer(f);
  });
}

function clearFiles() {
  filesData = [];
  document.getElementById('fl').innerHTML = '';
  document.getElementById('bcvt').disabled = true;
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('fi').value = '';
  showToast("Arquivos removidos", "success");
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.innerText = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 400);
  }, 3000);
}

function escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function parseDOCX(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);
  const relsText = await zip.file('word/_rels/document.xml.rels').async('text');
  const relsDoc = new DOMParser().parseFromString(relsText, 'text/xml');
  const relMap = {};
  for (const rel of relsDoc.getElementsByTagNameNS(REL_NS, 'Relationship')) relMap[rel.getAttribute('Id')] = rel.getAttribute('Target');

  const imgMap = {};
  for (const [rid, target] of Object.entries(relMap)) {
    const path = 'word/' + target.replace(/^\//, '');
    const f = zip.file(path);
    if (f && /png|jpg|jpeg|gif/i.test(path)) imgMap[rid] = { mime: 'image/'+path.split('.').pop(), b64: await f.async('base64') };
  }

  const docXml = new DOMParser().parseFromString(await zip.file('word/document.xml').async('text'), 'text/xml');
  const questions = [];

  for (const tbl of docXml.getElementsByTagNameNS(W, 'tbl')) {
    let currentQ = { enuncHtml: "", alternatives: [] };
    const rows = tbl.getElementsByTagNameNS(W, 'tr');
    
    for (const row of rows) {
      const cells = row.getElementsByTagNameNS(W, 'tc');
      if (cells.length < 2) continue;

      const label = cells[0].textContent.trim();
      let targetCell = null;
      for (let i = 1; i < cells.length; i++) {
        if (cells[i].textContent.trim() !== "") { targetCell = cells[i]; break; }
      }
      if (!targetCell) continue;

      let htmlContent = "";
      for (const p of targetCell.getElementsByTagNameNS(W, 'p')) {
        let pText = "";
        for (const r of p.getElementsByTagNameNS(W, 'r')) {
          const drw = r.getElementsByTagNameNS(W, 'drawing')[0];
          if (drw) {
            const blip = drw.getElementsByTagNameNS(A, 'blip')[0];
            const rid = blip?.getAttributeNS(R, 'embed');
            if (rid && imgMap[rid]) pText += `<img src="data:${imgMap[rid].mime};base64,${imgMap[rid].b64}" style="max-width:100%">`;
          }
          const t = r.getElementsByTagNameNS(W, 't')[0];
          if (t) {
            let s = escXml(t.textContent);
            if (r.getElementsByTagNameNS(W, 'b').length) s = `<b>${s}</b>`;
            pText += s;
          }
        }
        if (pText.trim()) htmlContent += `<p>${pText}</p>`;
      }

      if (/ENUNCIADO/i.test(label)) {
        currentQ.enuncHtml = htmlContent;
      } 
      else if (/^CORRETA/i.test(label)) {
        currentQ.alternatives.push({ html: htmlContent, fraction: 100 });
      } 
      else if (/^Incorreta/i.test(label)) {
        currentQ.alternatives.push({ html: htmlContent, fraction: 0 });
      }
    }
    if (currentQ.enuncHtml && currentQ.alternatives.length > 0) questions.push(currentQ);
  }
  return questions;
}

function buildXML(questions) {
  let x = `<?xml version="1.0" encoding="UTF-8"?>\n<quiz>\n`;
  questions.forEach((q, i) => {
    x += `<question type="multichoice">\n<name><text>Q${(i+1).toString().padStart(2,'0')}</text></name>\n`;
    x += `<questiontext format="html"><text><![CDATA[${q.enuncHtml}]]></text></questiontext>\n`;
    x += `<single>true</single><shuffleanswers>true</shuffleanswers><answernumbering>abc</answernumbering>\n`;
    q.alternatives.forEach(alt => {
      x += `<answer fraction="${alt.fraction}" format="html"><text><![CDATA[${alt.html}]]></text></answer>\n`;
    });
    x += `</question>\n`;
  });
  return x + `</quiz>`;
}

async function doConvert() {
  const btn = document.getElementById('bcvt');
  btn.disabled = true;
  try {
    let total = 0;
    if (filesData.length === 1) {
      const f = filesData[0];
      const qs = await parseDOCX(f.buffer);
      total = qs.length;
      const xmlString = "\ufeff" + buildXML(qs);
      const blob = new Blob([xmlString], {type: 'text/xml;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = f.name.replace('.docx', '.xml');
      a.click();
    } else {
      const zip = new JSZip();
      for (const f of filesData) {
        const qs = await parseDOCX(f.buffer);
        total += qs.length;
        zip.file(f.name.replace('.docx','.xml'), "\ufeff" + buildXML(qs));
      }
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "questoes_moodle.zip";
      a.click();
    }
    showToast(`Download de ${total} questões finalizado!`, "success");
  } catch (e) {
    showToast("Erro na conversão", "error");
  } finally { btn.disabled = false; }
}
</script>
</body>
</html>
